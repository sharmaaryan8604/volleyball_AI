services:
  - type: web
    name: volleyball-ai-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT

    pythonVersion: 3.10.13

    envVars:
      - key: MODEL_DIR
        value: models

    healthCheckPath: /health
    autoDeploy: true