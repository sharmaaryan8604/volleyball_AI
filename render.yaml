services:
  - type: web
    name: volleyball-ai-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r api/requirements.txt && python pre_train.py
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: MODEL_DIR
        value: models
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: model-cache
      mountPath: /opt/render/project/src/models
      sizeGB: 1
